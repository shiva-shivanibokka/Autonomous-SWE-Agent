# Render Blueprint for the serving API.
#
# This hosts the lightweight endpoints only: /health, /providers, /benchmark,
# /metrics/summary. Live agent runs are DISABLED here (ENABLE_LIVE_RUNS=false)
# because they require a Docker sandbox to execute untrusted repo code — those
# run locally via docker-compose. The BYOK model keys arrive per request and are
# never stored, so this service holds no secrets.
#
# Deploy: push this repo, then in Render → New → Blueprint, point at this file.
services:
  - type: web
    name: swe-agent-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: "pip install -r requirements-serve.txt && pip install -e . --no-deps"
    startCommand: "uvicorn api.main:app --host 0.0.0.0 --port $PORT --workers 1"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: ENABLE_LIVE_RUNS
        value: "false"
      # Lock CORS to the deployed frontend origin.
      - key: FRONTEND_ORIGIN
        value: "https://autonomous-swe-agent.vercel.app"
      # Set to this service's own URL once known, e.g. https://swe-agent-api.onrender.com
      - key: PUBLIC_BASE_URL
        sync: false
