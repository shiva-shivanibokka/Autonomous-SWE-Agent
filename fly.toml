# Fly.io config for the serving API (metadata + benchmark).
#
# Live agent runs are DISABLED here (ENABLE_LIVE_RUNS=false) — they need a Docker
# sandbox to execute untrusted repo code and run locally. This service holds no
# secrets (BYOK keys arrive per request). auto_stop + min_machines_running=0 means
# it scales to zero when idle, so a low-traffic portfolio backend costs ~nothing.
#
# Deploy:  fly launch --no-deploy --copy-config   (first time, to create the app)
#          fly deploy
#          fly secrets set PUBLIC_BASE_URL=https://<your-app>.fly.dev
app = "swe-agent-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.serve"

[env]
  ENABLE_LIVE_RUNS = "false"
  FRONTEND_ORIGIN = "https://autonomous-swe-agent.vercel.app"
  # PUBLIC_BASE_URL is set post-deploy via `fly secrets set` once the URL is known.

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "30s"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
